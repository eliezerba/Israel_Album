                return Object.entries(scenes).map(([name, node]) => ({ name, count: node.count, topObj: Object.entries(node.objects).sort((a,b)=>b[1]-a[1]).slice(0, 3).map(x=>x[0]).join(', '), weight: (node.count/total)*100 })).sort((a,b) => b.weight - a.weight).slice(0, 8);
            }, [images]);

            const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#10b981', '#14b8a6'];
            const [ttip, setTtip] = useState(null);

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <VizTitle icon="ph-fill ph-squares-four" iconColor="text-pink-600" he="מפת עץ היררכית" en="Hierarchical Treemap" />
                    <BilingualTheoryBox 
                        titleHe="חלוקת נדלן מרחבית"
                        titleEn="Spatial Real Estate Division"
                        fields="Scene (Parent Area) & Objects (Child Labels)"
                        algoHe="יצירת מלבנים בעלי שטח פרופורציונלי לתדירות המוחלטת של הסצנה באלבום. בתוך כל שטח 'נדלן' מחושבים ומודפסים אובייקטי-הליבה של אותו אזור."
                        algoEn="Creating rectangles with areas proportional to the absolute frequency of the scene in the album. Within each 'real estate' area, the core objects of that region are calculated and printed."
                        claimHe="ממחיש את חלוקת המשקל של החללים המיוצגים באלבום. אם 'שדה הקרב' תופס 60% מהשטח הויזואלי ו'העיר' רק 10%, אנו מבינים את סדר העדיפויות הלאומי במבט אחד מהיר."
                        claimEn="Illustrates the weight distribution of the spaces represented in the album. If the 'battlefield' takes up 60% of the visual space and the 'city' only 10%, we grasp the national priorities at a single quick glance."
                    />
                    <div className="flex flex-wrap gap-2 h-64 mt-6">
                        {data.map((scene, idx) => (
                            <div key={scene.name} className="treemap-node rounded-xl p-4 flex flex-col justify-between text-white overflow-hidden relative cursor-pointer" style={{ width: `calc(${scene.weight}% - 0.5rem)`, minWidth: '120px', flexGrow: scene.weight, backgroundColor: colors[idx % colors.length] }}
                                onMouseEnter={e => setTtip({x:e.clientX,y:e.clientY,content:`${scene.name}\n${scene.count} עמודים (${scene.weight.toFixed(1)}%)\nעצמים: ${scene.topObj}`})}
                                onMouseMove={e => setTtip(p => p ? {...p,x:e.clientX,y:e.clientY} : null)}
                                onMouseLeave={() => setTtip(null)}>
                                <span className="text-base font-black capitalize drop-shadow-md">{scene.name}</span>
                                <div className="mt-2 text-[11px] leading-tight opacity-90 border-t border-white/30 pt-2"><strong>מרכיבים מרכזיים:</strong><br/>{scene.topObj}</div>
                                <span className="absolute bottom-2 left-3 text-3xl font-black opacity-20">{scene.count}</span>
                            </div>
                        ))}
                    </div>
                    <ChartTooltip tooltip={ttip} />
                </div>
            );
        };

        // ==========================================
        // VIZ 11: זרמי סצנות (Scene Streamgraph)
        // ==========================================
        const SceneStreamgraph = ({ images, onTagClick }) => {
            const [ttip, setTtip] = useState(null);
            const data = useMemo(() => {
                const pages = images.map(img => ({
                    page: img.image_num,
                    scene: primaryScene(img.parsedMetadata.Scene)
                })).sort((a, b) => a.page - b.page);

                const sceneCounts = {};
                pages.forEach(p => { sceneCounts[p.scene] = (sceneCounts[p.scene] || 0) + 1; });
                const topScenes = Object.entries(sceneCounts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name]) => name);

                const binCount = Math.min(28, Math.max(14, Math.round(pages.length / 4)));
                const matrix = {};
                topScenes.forEach(scene => { matrix[scene] = new Array(binCount).fill(0); });

                pages.forEach((p, idx) => {
                    if (!matrix[p.scene]) return;
                    const bin = Math.min(binCount - 1, Math.floor((idx / Math.max(1, pages.length)) * binCount));
                    matrix[p.scene][bin] += 1;
                });

                const binTotals = new Array(binCount).fill(0);
                topScenes.forEach(scene => {
                    matrix[scene].forEach((v, i) => { binTotals[i] += v; });
                });

                const stacked = {};
                const cumulative = new Array(binCount).fill(0);
                topScenes.forEach(scene => {
                    const lower = [];
                    const upper = [];
                    for (let i = 0; i < binCount; i++) {
                        const frac = binTotals[i] ? matrix[scene][i] / binTotals[i] : 0;
                        lower.push(cumulative[i]);
                        cumulative[i] += frac;
                        upper.push(cumulative[i]);
                    }
                    stacked[scene] = { lower, upper };
                });

                return { topScenes, stacked, binCount };
            }, [images]);

            const makeAreaPath = (lower, upper, width, height) => {
                if (!upper.length) return '';
                const step = upper.length > 1 ? width / (upper.length - 1) : width;
                let d = `M 0 ${height - upper[0] * height}`;
                for (let i = 1; i < upper.length; i++) {
                    d += ` L ${i * step} ${height - upper[i] * height}`;
                }
                for (let i = lower.length - 1; i >= 0; i--) {
                    d += ` L ${i * step} ${height - lower[i] * height}`;
                }
                return `${d} Z`;
            };

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <VizTitle icon="ph-fill ph-wave-sawtooth" iconColor="text-cyan-600" he="זרמי סצנות לאורך זמן" en="Scene Streams Over Time" />
                    <BilingualTheoryBox
                        titleHe="זרם נושאי-מרחבי"
                        titleEn="Spatial Topic Stream"
                        fields="image_num, Scene"
                        fieldMapHe={[
                            { field: 'image_num', action: 'מחלק את האלבום למקטעי זמן שווים.' },
                            { field: 'Scene', action: 'סופר בכל מקטע מה היחס של כל סצנה מתוך כלל הסצנות במקטע.' }
                        ]}
                        fieldMapEn={[
                            { field: 'image_num', action: 'Partitions the album into equal temporal bins.' },
                            { field: 'Scene', action: 'Computes per-bin proportional scene share among all scene-labeled pages.' }
                        ]}
                        stepsHe={[
                            'בחירת 6 הסצנות השכיחות בקורפוס.',
                            'חישוב פרופורציה לכל סצנה בכל bin זמן.',
                            'הצגה כזרמים מצטברים המראים מי שולט בכל פרק באלבום.'
                        ]}
                        stepsEn={[
                            'Select the 6 most frequent scenes in the corpus.',
                            'Compute each scene\'s proportional share per temporal bin.',
                            'Render stacked streams to reveal dominance shifts across album phases.'
                        ]}
                        algoHe="מודל streamgraph יחסי: בכל מקטע זמן גובה הזרם מייצג חלק יחסי של סצנה מתוך כלל הסצנות במקטע."
                        algoEn="Relative streamgraph model: stream thickness per bin represents each scene\'s share of all scenes in that temporal slice."
                        claimHe="מבליט תנודות של משטרי ייצוג מרחביים לאורך האלבום, בדומה לויזואליזציות topic-stream במחקרי distant reading/viewing."
                        claimEn="Highlights shifts in spatial representational regimes over time, inspired by topic-stream approaches in distant reading/viewing."
                    />

                    <div className="flex flex-wrap gap-3 mt-6 mb-4">
                        {data.topScenes.map(scene => (
                            <button key={scene} onClick={() => onTagClick && onTagClick(scene, 'Scene')} className="px-2 py-1 rounded-md text-xs font-bold text-white capitalize" style={{ backgroundColor: sceneColor(scene) }}>
                                {scene}
                            </button>
                        ))}
                    </div>

                    <div className="w-full h-64 border border-slate-300 rounded-xl bg-slate-50 overflow-hidden">
                        <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1200 260"
                            onMouseMove={e => {
                                const r = e.currentTarget.getBoundingClientRect();
                                const xFrac = (e.clientX - r.left) / r.width;
                                const binIdx = Math.min(data.binCount - 1, Math.floor(xFrac * data.binCount));
                                const yFrac = (e.clientY - r.top) / r.height;
                                const stackedAt = data.topScenes.map(s => ({ scene: s, upper: data.stacked[s].upper[binIdx] || 0 }));
                                const hit = [...stackedAt].reverse().find(s => (1 - yFrac) <= s.upper);
                                setTtip({x:e.clientX,y:e.clientY,content:hit ? `${hit.scene}\nמקטע ${binIdx+1}/${data.binCount}` : ''});
                            }}
                            onMouseLeave={() => setTtip(null)}>
                            {data.topScenes.map(scene => (
                                <path
                                    key={scene}
                                    d={makeAreaPath(data.stacked[scene].lower, data.stacked[scene].upper, 1200, 240)}
                                    fill={sceneColor(scene)}
                                    opacity="0.75"
                                />
                            ))}
                        </svg>
                    </div>
                    <ChartTooltip tooltip={ttip} />
                </div>
            );
        };

        // ==========================================
        // VIZ 12: פילוח נרטיבי אוטומטי
        // ==========================================
        const NarrativeSegmentation = ({ images }) => {
            const [ttipN, setTtipN] = useState(null);
            const contRefN = useRef(null);
            const data = useMemo(() => {
                const pages = images
                    .map(img => ({
                        page: img.image_num,
                        scene: primaryScene(img.parsedMetadata.Scene),
                        vibe: primaryVibe(img.parsedMetadata.Vibe),
                        objectSet: new Set((img.parsedMetadata.Objects || '').split(',').map(x => x.trim().toLowerCase()).filter(Boolean))
                    }))
                    .sort((a, b) => a.page - b.page);

                const scores = [0];
                for (let i = 1; i < pages.length; i++) {
                    const prev = pages[i - 1];
                    const curr = pages[i];
                    const sceneShift = prev.scene === curr.scene ? 0 : 1;
                    const vibeShift = prev.vibe === curr.vibe ? 0 : 1;
                    const objShift = jaccardDistance(prev.objectSet, curr.objectSet);
                    scores.push(0.35 * sceneShift + 0.25 * vibeShift + 0.4 * objShift);
                }

                const mean = scores.reduce((a, b) => a + b, 0) / Math.max(1, scores.length);
                const variance = scores.reduce((a, b) => a + ((b - mean) ** 2), 0) / Math.max(1, scores.length);
                const std = Math.sqrt(variance);
                const threshold = mean + std * 0.7;

                const breakpoints = [];
                scores.forEach((score, idx) => {
                    if (idx > 0 && score >= threshold) breakpoints.push(idx);
                });

                const segments = [];
                let start = 0;
                breakpoints.forEach(bp => {
                    segments.push({ start, end: bp });
                    start = bp + 1;
                });
                if (pages.length) segments.push({ start, end: pages.length - 1 });

                return { pages, scores, breakpoints, threshold, segments };
            }, [images]);

            const linePath = useMemo(() => {
                if (!data.scores.length) return '';
                if (data.scores.length === 1) return 'M 0 140 L 1000 140';
                const step = 1000 / (data.scores.length - 1);
                let d = '';
                data.scores.forEach((s, i) => {
                    const x = i * step;
                    const y = 150 - (s * 130);
                    d += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
                });
                return d;
            }, [data.scores]);

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <VizTitle icon="ph-fill ph-split-horizontal" iconColor="text-fuchsia-600" he="פילוח נרטיבי אוטומטי" en="Automatic Narrative Segmentation" />
                    <BilingualTheoryBox
                        titleHe="חיתוך אוטומטי של פרקי האלבום"
                        titleEn="Automatic Album Segmentation"
                        fields="image_num, Scene, Vibe, Objects"
                        fieldMapHe={[
                            { field: 'image_num', action: 'מסדר את השוואות השינוי בין עמוד עוקב לעמוד עוקב.' },
                            { field: 'Scene + Vibe', action: 'מודד קפיצה קטגוריאלית בין עמודים סמוכים.' },
                            { field: 'Objects', action: 'מודד מרחק לקסיקלי (Jaccard) בין סטי אובייקטים סמוכים.' }
                        ]}
                        fieldMapEn={[
                            { field: 'image_num', action: 'Defines adjacent page-to-page comparisons across the album timeline.' },
                            { field: 'Scene + Vibe', action: 'Measures categorical jumps between neighboring pages.' },
                            { field: 'Objects', action: 'Computes lexical set distance (Jaccard) between adjacent object sets.' }
                        ]}
                        stepsHe={[
                            'לכל זוג עמודים עוקבים מחושב ציון שינוי משוקלל בטווח 0..1.',
                            'נקודת שבר מסומנת כאשר ציון השינוי גבוה מסף סטטיסטי (ממוצע + 0.7 סטיית תקן).',
                            'המערכת מפיקה פרקי-אלבום רציפים ומציגה את גבולותיהם.'
                        ]}
                        stepsEn={[
                            'A weighted page-to-page change score is computed in the 0..1 range.',
                            'A breakpoint is flagged when the score exceeds a statistical threshold (mean + 0.7 SD).',
                            'Continuous album segments are emitted and rendered as narrative phases.'
                        ]}
                        algoHe="אלגוריתם סגמנטציה המבוסס על שינוי סמנטי בין עמודים סמוכים, ולא על ספירה מצטברת בלבד."
                        algoEn="Segmentation algorithm based on adjacent semantic change rather than aggregate counting alone."
                        claimHe="מאפשר לזהות פרקים מובחנים בתוך האלבום ולבדוק אם סדר העמודים יוצר מהלך נרטיבי מכוון."
                        claimEn="Reveals distinct phases in the album and tests whether page ordering encodes an intentional narrative arc."
                    />

                    <div ref={contRefN} className="relative w-full h-44 mt-6 bg-slate-50 border border-slate-300 rounded-xl overflow-hidden cursor-crosshair"
                        onMouseMove={(e) => { const r=contRefN.current?.getBoundingClientRect(); if(!r) return; const idx=Math.max(0,Math.min(data.scores.length-1,Math.round(((e.clientX-r.left)/r.width)*(data.scores.length-1)))); const pg=data.pages[idx]; const sc=data.scores[idx]; const isBp=data.breakpoints.includes(idx); setTtipN({x:e.clientX,y:e.clientY,content:`עמוד ${pg?.page||idx+1}\nציון שינוי: ${sc.toFixed(3)}${isBp?'\n⚡ נקודת שבר!':''}\nסצנה: ${pg?.scene||'?'} | אווירה: ${pg?.vibe||'?'}`}); }}
                        onMouseLeave={() => setTtipN(null)}>
                        <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1000 170">
                            <line x1="0" y1={150 - data.threshold * 130} x2="1000" y2={150 - data.threshold * 130} stroke="#f43f5e" strokeDasharray="5 5" />
                            <path d={linePath} fill="none" stroke="#7c3aed" strokeWidth="3" />
                            {data.breakpoints.map(bp => (
                                <line key={`bp-${bp}`} x1={(bp / Math.max(1, data.scores.length - 1)) * 1000} y1="0" x2={(bp / Math.max(1, data.scores.length - 1)) * 1000} y2="170" stroke="#ef4444" strokeWidth="1.5" />
                            ))}
                        </svg>
                    </div>
                    <ChartTooltip tooltip={ttipN} />

                    <div className="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-2">
                        {data.segments.map((seg, idx) => {
                            const startPage = data.pages[seg.start]?.page;
                            const endPage = data.pages[seg.end]?.page;
                            return (
                                <div key={`seg-${idx}`} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold text-slate-700">
                                    פרק {idx + 1}: עמ' {startPage} - {endPage}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        // ==========================================
        // VIZ 13: מדד אי-ודאות אנוטציה
        // ==========================================
        const AnnotationUncertainty = ({ images }) => {
            const data = useMemo(() => {
                return images
                    .map(img => {
                        const captionSet = toTokenSet(img.parsedMetadata.Caption || '');
                        const descSet = toTokenSet(img.parsedMetadata.Description || '');
                        const ocrSet = toTokenSet(img.parsedMetadata.Text || '');

                        const distances = [];
                        if (captionSet.size && descSet.size) distances.push(jaccardDistance(captionSet, descSet));
                        if (captionSet.size && ocrSet.size) distances.push(jaccardDistance(captionSet, ocrSet));
                        if (descSet.size && ocrSet.size) distances.push(jaccardDistance(descSet, ocrSet));

                        const score = distances.length ? distances.reduce((a, b) => a + b, 0) / distances.length : 0;
                        return {
                            page: img.image_num,
                            score,
                            support: distances.length
                        };
                    })
                    .sort((a, b) => a.page - b.page);
            }, [images]);

            const maxScore = Math.max(...data.map(d => d.score), 1);
            const topUncertain = [...data].sort((a, b) => b.score - a.score).slice(0, 8);

            const makePath = (vals, width, height) => {
                if (!vals.length) return '';
                if (vals.length === 1) return `M 0 ${height - vals[0] * height} L ${width} ${height - vals[0] * height}`;
                const step = width / (vals.length - 1);
                let d = '';
                vals.forEach((v, i) => {
                    const x = i * step;
                    const y = height - v * height;
                    d += `${i === 0 ? 'M' : 'L'} ${x} ${y} `;
                });
                return d;
            };

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <VizTitle icon="ph-fill ph-warning-circle" iconColor="text-rose-600" he="מדד אי-ודאות תיאורי" en="Annotation Uncertainty Index" />
                    <BilingualTheoryBox
                        titleHe="אי-התאמה בין שכבות הטקסט"
                        titleEn="Cross-Channel Annotation Uncertainty"
                        fields="Caption, Description, Text(OCR), image_num"
                        fieldMapHe={[
                            { field: 'Caption + Description + Text', action: 'מייצר סטי מילים לכל שכבה ומודד מרחקים זוגיים בין השכבות.' },
                            { field: 'image_num', action: 'ממקם את ציון האי-ודאות על ציר לינארי לאורך האלבום.' }
                        ]}
                        fieldMapEn={[
                            { field: 'Caption + Description + Text', action: 'Builds token sets and computes pairwise cross-layer lexical distances.' },
                            { field: 'image_num', action: 'Places uncertainty scores on a linear album axis.' }
                        ]}
                        stepsHe={[
                            'ניקוי טקסט ופירוק למילים לכל אחת משלוש שכבות הטקסט.',
                            'חישוב מרחק Jaccard בין כל זוג שכבות קיים באותו עמוד.',
                            'הממוצע הזוגי הוא ציון אי-ודאות: גבוה = סתירה/פער בין שכבות.'
                        ]}
                        stepsEn={[
                            'Normalize and tokenize each text layer per page.',
                            'Compute Jaccard distance for every available pair of layers.',
                            'Pairwise average yields the uncertainty score: high = stronger cross-layer divergence.'
                        ]}
                        algoHe="מדד אי-ודאות מולטי-מודאלי על בסיס מרחק לקסיקלי בין Caption, OCR ו-Description."
                        algoEn="Multimodal uncertainty index using lexical distance across Caption, OCR, and Description."
                        claimHe="מדגיש עמודים שבהם המכונה והעורך מספרים סיפורים שונים, ולכן נדרשת קריאה ביקורתית קרובה."
                        claimEn="Flags pages where machine and editorial channels diverge, indicating priority zones for close critical reading."
                    />

                    {(() => { const [ttipAU, setTtipAU] = React.useState(null); return (
                    <div className="relative w-full h-36 mt-6 bg-slate-50 border border-slate-300 rounded-xl overflow-hidden cursor-crosshair"
                        onMouseMove={e => {
                            const r = e.currentTarget.getBoundingClientRect();
                            const idx = Math.max(0, Math.min(data.length - 1, Math.round(((e.clientX - r.left) / r.width) * (data.length - 1))));
                            const item = data[idx];
                            if (item) setTtipAU({x:e.clientX,y:e.clientY,content:`עמ' ${item.page}\nאי-ודאות: ${item.score.toFixed(3)}\nמקורות: ${item.support} זוגות`});
                        }}
                        onMouseLeave={() => setTtipAU(null)}>
                        <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 1000 160">
                            <path d={makePath(data.map(d => d.score / maxScore), 1000, 150)} fill="none" stroke="#e11d48" strokeWidth="3" />
                        </svg>
                        <ChartTooltip tooltip={ttipAU} />
                    </div>
                    ); })()}

                    <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                        {topUncertain.map(item => (
                            <div key={`u-${item.page}`} className="px-3 py-2 rounded-lg border border-rose-200 bg-rose-50 text-rose-800 font-bold">
                                עמ' {item.page}: {item.score.toFixed(2)}
                            </div>

                </div>

        // ==========================================
        // VIZ 14: רשת שחקנים מרחבית
        // ==========================================
        const SceneObjectNetwork = ({ images, onTagClick }) => {
            const [ttip, setTtip] = useState(null);
            const data = useMemo(() => {
                const sceneCounts = {};
                const objectCounts = {};
                const edgeCounts = {};

                images.forEach(img => {
                    const scene = primaryScene(img.parsedMetadata.Scene);
                    const objects = (img.parsedMetadata.Objects || '').split(',').map(x => x.trim().toLowerCase()).filter(Boolean);
                    if (!objects.length) return;
                    sceneCounts[scene] = (sceneCounts[scene] || 0) + 1;
                    objects.forEach(obj => {
                        objectCounts[obj] = (objectCounts[obj] || 0) + 1;
                        const edgeKey = `${scene}::${obj}`;
                        edgeCounts[edgeKey] = (edgeCounts[edgeKey] || 0) + 1;
                    });
                });

                const scenes = Object.entries(sceneCounts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name, count]) => ({ name, count }));
                const objects = Object.entries(objectCounts).sort((a, b) => b[1] - a[1]).slice(0, 12).map(([name, count]) => ({ name, count }));

                const sceneSet = new Set(scenes.map(s => s.name));
                const objectSet = new Set(objects.map(o => o.name));
                const edges = Object.entries(edgeCounts)
                    .map(([key, count]) => {
                        const [scene, obj] = key.split('::');
                        return { scene, obj, count };
                    })
                    .filter(e => sceneSet.has(e.scene) && objectSet.has(e.obj) && e.count >= 2)
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 40);

                const maxEdge = Math.max(...edges.map(e => e.count), 1);
                return { scenes, objects, edges, maxEdge };
            }, [images]);

            const sceneNodes = data.scenes.map((s, idx) => ({ ...s, x: 200, y: 70 + idx * (420 / Math.max(1, data.scenes.length - 1)) }));
            const objectNodes = data.objects.map((o, idx) => ({ ...o, x: 1000, y: 70 + idx * (420 / Math.max(1, data.objects.length - 1)) }));
            const scenePos = Object.fromEntries(sceneNodes.map(n => [n.name, n]));
            const objectPos = Object.fromEntries(objectNodes.map(n => [n.name, n]));

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <VizTitle icon="ph-fill ph-share-network" iconColor="text-emerald-600" he="רשת שחקנים מרחבית" en="Spatial Actor Network (Scene↔Objects)" />
                    <BilingualTheoryBox
                        titleHe="רשת דו-צדדית של סצנות ואובייקטים"
                        titleEn="Bipartite Scene-Object Network"
                        fields="Scene, Objects"
                        fieldMapHe={[
                            { field: 'Scene', action: 'קובע את צומת המקור המרחבי (זירה).' },
                            { field: 'Objects', action: 'קובע את צומתי היעד ומחשב משקל קישור לפי שכיחות הופעה משותפת.' }
                        ]}
                        fieldMapEn={[
                            { field: 'Scene', action: 'Defines source-side spatial nodes.' },
                            { field: 'Objects', action: 'Defines target nodes and computes co-occurrence edge weights.' }
                        ]}
                        stepsHe={[
                            'בחירת סצנות ואובייקטים דומיננטיים בלבד לצמצום רעש.',
                            'חישוב משקל לכל קשת Scene→Object לפי ספירת הופעות משותפות.',
                            'עובי וכהות הקשת משקפים חוזק קשר במערכת הבימוי.'
                        ]}
                        stepsEn={[
                            'Select dominant scene and object nodes to suppress tail noise.',
                            'Compute Scene→Object edge weights by co-occurrence counts.',
                            'Edge width and opacity encode relationship strength in the mise-en-scene system.'
                        ]}
                        algoHe="גרף דו-צדדי משוקלל לחשיפת קואליציות קבועות בין זירות ואובייקטים."
                        algoEn="Weighted bipartite graph exposing recurrent coalitions between spaces and objects."
                        claimHe="מאפשר לזהות במהירות אילו אובייקטים 'כלואים' בזירות מסוימות ואילו נודדים בין זירות."
                        claimEn="Quickly reveals which objects are spatially constrained and which migrate across scene types."
                    />

                    <div className="overflow-x-auto mt-6" dir="ltr">
                        <div className="min-w-[1140px] h-[500px] bg-slate-50 border border-slate-300 rounded-xl">
                            <svg className="w-full h-full" viewBox="0 0 1200 500">
                                {data.edges.map((edge, idx) => {
                                    const s = scenePos[edge.scene];
                                    const o = objectPos[edge.obj];
                                    if (!s || !o) return null;
                                    const opacity = 0.15 + (edge.count / data.maxEdge) * 0.85;
                                    return (
                                        <path
                                            key={`edge-${idx}`}
                                            d={`M ${s.x} ${s.y} C 520 ${s.y}, 680 ${o.y}, ${o.x} ${o.y}`}
                                            stroke="#0f766e"
                                            strokeWidth={1 + (edge.count / data.maxEdge) * 4}
                                            fill="none"
                                            opacity={opacity}
                                            className="cursor-pointer"
                                            onMouseEnter={e => setTtip({x:e.clientX,y:e.clientY,content:`${edge.scene} → ${edge.obj}\n${edge.count} הופעות משותפות`})}
                                            onMouseMove={e => setTtip(p => p ? {...p,x:e.clientX,y:e.clientY} : null)}
                                            onMouseLeave={() => setTtip(null)}
                                        />
                                    );
                                })}

                                {sceneNodes.map(node => (
                                    <g key={`scene-${node.name}`} onClick={() => onTagClick && onTagClick(node.name, 'Scene')} className="cursor-pointer"
                                        onMouseEnter={e => setTtip({x:e.clientX,y:e.clientY,content:`סצנה: ${node.name}\n${node.count} עמודים`})}
                                        onMouseMove={e => setTtip(p => p ? {...p,x:e.clientX,y:e.clientY} : null)}
                                        onMouseLeave={() => setTtip(null)}>
                                        <circle cx={node.x} cy={node.y} r="10" fill={sceneColor(node.name)} />
                                        <text x={node.x - 14} y={node.y + 4} textAnchor="end" fontSize="12" fill="#0f172a" className="capitalize font-bold">{node.name}</text>
                                    </g>
                                ))}

                                {objectNodes.map(node => (
                                    <g key={`obj-${node.name}`} onClick={() => onTagClick && onTagClick(node.name, 'Objects')} className="cursor-pointer"
                                        onMouseEnter={e => setTtip({x:e.clientX,y:e.clientY,content:`אובייקט: ${node.name}\n${node.count} הופעות`})}
                                        onMouseMove={e => setTtip(p => p ? {...p,x:e.clientX,y:e.clientY} : null)}
                                        onMouseLeave={() => setTtip(null)}>
                                        <circle cx={node.x} cy={node.y} r="8" fill="#2563eb" />
                                        <text x={node.x + 14} y={node.y + 4} textAnchor="start" fontSize="12" fill="#1e293b" className="capitalize font-bold">{node.name}</text>
                                    </g>
                                ))}
                            </svg>
                        </div>
                    </div>
                    <ChartTooltip tooltip={ttip} />
                </div>
            );
        };

        const SmallMultiplesComparison = ({ albums }) => {
            const data = useMemo(() => {
                const binCount = 24;
                const byAlbum = albums.map(album => {
                    const images = [...album.images].sort((a, b) => a.image_num - b.image_num);
                    const bins = new Array(binCount).fill(null).map(() => ({ p: [], c: [], t: [] }));
                    images.forEach((img, idx) => {
                        const b = Math.min(binCount - 1, Math.floor((idx / Math.max(1, images.length)) * binCount));
                        bins[b].p.push(toPeopleValue(img.parsedMetadata.People));
                        bins[b].c.push((img.parsedMetadata.Objects || '').split(',').map(x => x.trim()).filter(Boolean).length);
                        bins[b].t.push(tokenize(img.parsedMetadata.Caption || '').length + tokenize(img.parsedMetadata.Text || '').length);
                    });
                    const avg = (arr) => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
                    return {
                        title: album.album.title_en || album.album.title_he || 'Untitled Album',
                        people: bins.map(x => avg(x.p)),
                        complexity: bins.map(x => avg(x.c)),
                        textual: bins.map(x => avg(x.t))
                    };
                });

                const maxPeople = Math.max(...byAlbum.flatMap(x => x.people), 1);
                const maxComplexity = Math.max(...byAlbum.flatMap(x => x.complexity), 1);
                const maxTextual = Math.max(...byAlbum.flatMap(x => x.textual), 1);

                return byAlbum.map(a => ({
                    ...a,
                    peopleN: a.people.map(v => v / maxPeople),
                    complexityN: a.complexity.map(v => v / maxComplexity),
                    textualN: a.textual.map(v => v / maxTextual)
                }));
            }, [albums]);

            const sparkPath = (values, width, height) => {
                if (!values.length) return '';
                if (values.length === 1) return `M 0 ${height - values[0] * height} L ${width} ${height - values[0] * height}`;
                const step = width / (values.length - 1);
                let d = '';
                values.forEach((v, i) => {
                    d += `${i === 0 ? 'M' : 'L'} ${i * step} ${height - v * height} `;
                });
                return d;
            };

            return (
                <div className="space-y-5">
                    {data.map((album, idx) => (
                        <div key={`sm-${idx}`} className="bg-white border border-slate-200 rounded-2xl p-5">
                            <h4 className="text-base font-black text-slate-800 mb-3">{album.title}</h4>
                            {[{ label: 'People Density', values: album.peopleN, color: '#2563eb' }, { label: 'Object Complexity', values: album.complexityN, color: '#ea580c' }, { label: 'Textual Weight', values: album.textualN, color: '#ca8a04' }].map((row) => (
                                <div key={`${album.title}-${row.label}`} className="mb-3">
                                    <div className="text-[11px] font-bold text-slate-500 mb-1">{row.label}</div>
                                    <div className="h-14 border border-slate-200 rounded bg-slate-50">
                                        <svg className="w-full h-full" preserveAspectRatio="none" viewBox="0 0 900 56">
                                            <path d={sparkPath(row.values, 900, 50)} fill="none" stroke={row.color} strokeWidth="2.5" />
                                        </svg>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        // ==========================================
        // TAB 0: ספריה (Library)
        // ==========================================
        const LibraryTab = ({ albums, onGallery, onAnalyze, lang='he' }) => {
            const [search, setSearch] = useState('');
            const [sortBy, setSortBy] = useState('year');
            const [sortDir, setSortDir] = useState('asc');

            const filtered = useMemo(() => {
                const q = search.trim().toLowerCase();
                let list = albums.map((al, idx) => ({ al, idx }));
                if (q) {
                    list = list.filter(({ al }) => {
                        const hay = `${al.album.title_en || ''} ${al.album.title_he || ''} ${al.album.author || ''} ${al.album.publisher || ''} ${al.album.year || ''} ${al.album.place || ''}`.toLowerCase();
                        return hay.includes(q);
                    });
                }
                list.sort((a, b) => {
                    let va, vb;
                    if (sortBy === 'year') { va = parseInt(a.al.album.year) || 0; vb = parseInt(b.al.album.year) || 0; }
                    else if (sortBy === 'images') { va = a.al.images.length; vb = b.al.images.length; }
                    else { va = (a.al.album.title_en || a.al.album.title_he || '').toLowerCase(); vb = (b.al.album.title_en || b.al.album.title_he || '').toLowerCase(); }
                    if (va < vb) return sortDir === 'asc' ? -1 : 1;
                    if (va > vb) return sortDir === 'asc' ? 1 : -1;
                    return 0;
                });
                return list;
            }, [albums, search, sortBy, sortDir]);

            const toggleSort = (key) => {
                if (sortBy === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                else { setSortBy(key); setSortDir('asc'); }
            };
            const sortIcon = (key) => sortBy === key ? (sortDir === 'asc' ? ' ↑' : ' ↓') : '';

            return (
                <div className="h-full flex flex-col bg-slate-50 fade-in">
                    {/* Controls bar */}
                    <div className="bg-white border-b border-slate-200 px-6 py-4 flex flex-wrap items-center gap-4 shrink-0 shadow-sm">
                        <div className="relative flex-1 min-w-[240px] max-w-md">
                            <i className="ph-bold ph-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                            <input
                                type="text"
                                placeholder={lang === 'he' ? 'חיפוש לפי שם, כותב, שנה, מוציא...' : 'Search by title, author, year, publisher...'}
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                className="w-full border border-slate-300 rounded-xl pr-10 pl-4 py-2.5 text-sm focus:outline-none focus:border-blue-400"
                                dir="auto"
                            />
                        </div>
                        <div className="flex items-center gap-2 text-xs font-bold text-slate-500">
                            <span>{lang === 'he' ? 'מיון:' : 'Sort:'}</span>
                            {[['year', lang === 'he' ? 'שנה' : 'Year'], ['title', lang === 'he' ? 'שם' : 'Title'], ['images', lang === 'he' ? 'תמונות' : 'Images']].map(([key, label]) => (
                                <button key={key} onClick={() => toggleSort(key)}
                                    className={`px-3 py-1.5 rounded-lg border transition-all ${sortBy === key ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-slate-300 text-slate-600 hover:border-blue-400'}`}>
                                    {label}{sortIcon(key)}
                                </button>
                            ))}
                        </div>
                        <span className="text-xs text-slate-400 font-bold">{filtered.length} {lang === 'he' ? 'אלבומים' : 'albums'}</span>
                    </div>

                    {/* Cards grid */}
                    <div className="flex-1 overflow-y-auto p-6">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 max-w-screen-2xl mx-auto pb-20">
                            {filtered.map(({ al, idx }) => {
                                const cover = al.images.find(img => img.image_num === 1) || al.images[0];
                                const coverSrc = cover ? getImgSrcCandidates(cover) : null;
                                const title = lang === 'he' ? (al.album.title_he || al.album.title_en || '?') : (al.album.title_en || al.album.title_he || '?');
                                const subtitle = lang === 'he' ? (al.album.title_en || '') : (al.album.title_he || '');
                                return (
                                    <div key={al.album.id || idx} className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col group hover:shadow-lg hover:border-blue-300 transition-all">
                                        {/* Cover */}
                                        <div className="h-52 bg-slate-200 overflow-hidden relative">
                                            {coverSrc ? (
                                                <OptimizedImage src={coverSrc} alt={title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-slate-400">
                                                    <i className="ph ph-book-open text-5xl"></i>
                                                </div>
                                            )}
                                            <div className="absolute top-2 left-2 bg-black/60 text-white text-xs font-bold px-2 py-1 rounded-lg">
                                                {al.images.length} {lang === 'he' ? 'עמ׳' : 'pp'}
                                            </div>
                                            {al.album.year && (
                                                <div className="absolute top-2 right-2 bg-blue-600/90 text-white text-xs font-bold px-2 py-1 rounded-lg">
                                                    {al.album.year}
                                                </div>
                                            )}
                                        </div>
                                        {/* Info */}
                                        <div className="p-4 flex-1 flex flex-col gap-2">
                                            <h3 className="font-black text-slate-900 text-base leading-snug" dir="auto">{title}</h3>
                                            {subtitle && <p className="text-xs text-slate-400 italic" dir="auto">{subtitle}</p>}
                                            <div className="mt-1 space-y-1 text-xs text-slate-500">
                                                {al.album.author && <div className="flex gap-1.5 items-center"><i className="ph-fill ph-user text-slate-400"></i><span dir="auto">{al.album.author}</span></div>}
                                                {al.album.publisher && <div className="flex gap-1.5 items-center"><i className="ph-fill ph-buildings text-slate-400"></i><span dir="auto">{al.album.publisher}</span></div>}
                                                {al.album.place && <div className="flex gap-1.5 items-center"><i className="ph-fill ph-map-pin text-slate-400"></i><span dir="auto">{al.album.place}</span></div>}
                                            </div>
                                        </div>
                                        {/* Action buttons */}
                                        <div className="px-4 pb-4 flex gap-2">
                                            <button onClick={() => onGallery(idx)}
                                                className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl bg-slate-100 hover:bg-blue-600 hover:text-white text-slate-700 font-bold text-xs transition-all border border-slate-200 hover:border-blue-600">
                                                <i className="ph-bold ph-images text-base"></i>
                                                {lang === 'he' ? 'גלריה' : 'Gallery'}
                                            </button>
                                            <button onClick={() => onAnalyze(idx)}
                                                className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl bg-slate-100 hover:bg-purple-600 hover:text-white text-slate-700 font-bold text-xs transition-all border border-slate-200 hover:border-purple-600">
                                                <i className="ph-bold ph-presentation-chart text-base"></i>
                                                {lang === 'he' ? 'ניתוח' : 'Analyze'}
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                            {filtered.length === 0 && (
                                <div className="col-span-full flex flex-col items-center justify-center py-24 text-slate-400">
                                    <i className="ph ph-magnifying-glass text-5xl mb-4"></i>
                                    <p className="text-lg font-bold">{lang === 'he' ? 'לא נמצאו אלבומים' : 'No albums found'}</p>
                                </div>

            );

        // ==========================================
        // TAB 1: דפדוף וגלריה (Flipping Gallery)
        // ==========================================
        const GalleryTab = ({ albums, activeAlbumIndex, onAlbumChange, filter, setFilter, lang='he' }) => {
            const [focusedImage, setFocusedImage] = useState(null);
            const activeAlbum = albums[activeAlbumIndex];

            if (!activeAlbum) return null;

            const displayedImages = useMemo(() => {
                return activeAlbum.images.filter(img => {
                    if(!filter.tag) return true;
                    if(filter.category) {
                        const val = img.parsedMetadata[filter.category];
                        return val && val.toLowerCase().includes(filter.tag.toLowerCase());
                    }
                    const searchStr = `${img.parsedMetadata.Scene||''} ${img.parsedMetadata.Vibe||''} ${img.parsedMetadata.Objects||''}`.toLowerCase();
                    return searchStr.includes(filter.tag.toLowerCase());
                });
            }, [activeAlbum.images, filter]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (focusedImage === null) return;
                    if (e.key === 'ArrowRight') setFocusedImage(prev => prev < displayedImages.length - 1 ? prev + 1 : prev);
                    else if (e.key === 'ArrowLeft') setFocusedImage(prev => prev > 0 ? prev - 1 : prev);
                    else if (e.key === 'Escape') setFocusedImage(null);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [focusedImage, displayedImages.length]);

            useEffect(() => {
                if (focusedImage === null) return;
                [focusedImage - 1, focusedImage + 1].forEach(index => {
                    const img = displayedImages[index];
                    if (!img) return;
                    const preload = new Image();
                    preload.decoding = 'async';
                    preload.src = getImgSrc(img);
                });
            }, [focusedImage, displayedImages]);

            return (
                <div className="h-full flex flex-col bg-slate-100 fade-in">
                    <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-3 shrink-0">
                        <i className="ph-fill ph-book-open text-blue-600 text-xl shrink-0"></i>
                        <select
                            value={activeAlbumIndex}
                            onChange={e => { onAlbumChange(Number(e.target.value)); setFocusedImage(null); }}
                            className="flex-1 max-w-lg border border-slate-300 rounded-xl py-2 px-3 text-sm font-bold text-slate-800 bg-white focus:outline-none focus:border-blue-400 cursor-pointer"
                            dir="auto"
                        >
                            {albums.map((al, idx) => (
                                <option key={idx} value={idx}>
                                    {lang === 'he' ? (al.album.title_he || al.album.title_en || `אלבום ${idx+1}`) : (al.album.title_en || al.album.title_he || `Album ${idx+1}`)}
                                    {al.album.year ? ` (שנת ${al.album.year})` : ''}
                                </option>
                            ))}
                        </select>
                        <span className="text-xs text-slate-400 font-bold shrink-0">{activeAlbumIndex + 1} / {albums.length}</span>
                    </div>

                    <div className="bg-slate-100 px-6 py-3 flex justify-between items-center shrink-0 border-b border-slate-200">
                        <span className="text-slate-500 text-sm font-bold bg-white px-3 py-1 rounded-full shadow-sm">{lang === 'he' ? `מציג ${displayedImages.length} עמודים` : `Showing ${displayedImages.length} pages`}</span>
                        {filter.tag && (
                            <div className="bg-blue-600 text-white px-4 py-1.5 rounded-full flex items-center gap-3 shadow-md">

                    {focusedImage !== null && (() => {

                        return (
                            <div className="absolute inset-0 z-50 bg-slate-900/95 backdrop-blur-sm flex flex-col md:flex-row fade-in">
                                <button onClick={() => setFocusedImage(null)} className="absolute top-4 left-4 z-50 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full"><i className="ph-bold ph-x text-xl"></i></button>
                                <div className="flex-1 relative flex items-center justify-center p-4 lg:p-12 group">
                                    <button onClick={(e) => { e.stopPropagation(); setFocusedImage(prev => prev < displayedImages.length - 1 ? prev + 1 : prev); }} disabled={focusedImage === displayedImages.length - 1} className="absolute right-4 z-40 bg-black/50 hover:bg-black text-white p-4 rounded-full disabled:opacity-0"><i className="ph-bold ph-caret-right text-2xl"></i></button>

                                    <OptimizedImage src={getImgSrcCandidates(img)} alt={`Album page ${img.image_num}`} eager={true} className="max-w-full max-h-full object-contain drop-shadow-2xl mx-auto" />
                                </div>
                                <div className="w-full md:w-[450px] bg-white border-r border-slate-200 flex flex-col shrink-0 overflow-y-auto shadow-2xl">
                                    <div className="p-6 border-b border-slate-100 bg-slate-50 sticky top-0 z-10 flex items-center gap-4">
                                        <div className="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg transform -rotate-3">{img.image_num}</div>
                                        <div><h2 className="text-2xl font-black text-slate-900">{lang === 'he' ? `עמוד ${img.image_num}` : `Page ${img.image_num}`}</h2><p className="text-sm text-slate-500 font-bold">{lang === 'he' ? (activeAlbum.album.title_he || activeAlbum.album.title_en) : activeAlbum.album.title_en}</p></div>
                                    </div>
                                    <div className="p-6 space-y-8 bg-white flex-1">
                                        {/* Short caption as subtitle */}
                                        {img.short_caption && (
                                            <p className="text-sm text-slate-500 italic leading-relaxed border-b border-slate-100 pb-4">{img.short_caption}</p>
                                        )}
                                        <div className="space-y-6">
                                            {['Scene', 'Objects', 'Vibe', 'People'].map(cat => img.parsedMetadata[cat] && (
                                                <div key={cat}>
                                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-100 pb-1">{cat}</h3>
                                                    <div className="flex flex-wrap gap-2">

                                                    <div className="flex flex-wrap gap-2">
                                                        {img.parsedMetadata.Actions.split(',').map((a, i) => (
                                                            <span key={i} className="text-xs px-2.5 py-1 rounded-lg bg-orange-50 border border-orange-200 text-orange-800 font-medium">{a.trim()}</span>
                                                        ))}
                                                    </div>
                                                </div>

                                        <div className="pt-6 border-t border-slate-200 space-y-6">

                                            {img.parsedMetadata.Text && (<div><h3 className="text-[10px] font-black text-purple-600 uppercase tracking-widest mb-2"><i className="ph-fill ph-text-t"></i> OCR Text</h3><p className="text-sm p-4 rounded-xl bg-purple-50 border border-purple-200 text-purple-900 font-mono" dir="ltr">{img.parsedMetadata.Text}</p></div>)}

                                                <div><h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2"><i className="ph-fill ph-scan"></i> Raw OCR</h3><p className="text-sm p-4 rounded-xl bg-slate-50 border border-slate-200 text-slate-700 font-mono" dir="ltr">{img.ocr_text}</p></div>
