        };

        // ==========================================
        // TAB 2.5: חיפוש כללי (Global Search)
        // ==========================================
        const GlobalSearchTab = ({ albums, lang = 'he', onOpenAlbum }) => {
            const [query, setQuery] = useState('');
            const [albumFilter, setAlbumFilter] = useState('all');
            const [focusedIndex, setFocusedIndex] = useState(null);

            const dataset = useMemo(() => {
                return albums.flatMap((album, albumIndex) => {
                    const albumMeta = album.album || {};
                    return (album.images || []).map((img) => {
                        const parsed = img.parsedMetadata || parseCaptionString(img.caption);
                        const titleHe = albumMeta.title_he || albumMeta.title_en || `אלבום ${albumIndex + 1}`;
                        const titleEn = albumMeta.title_en || albumMeta.title_he || `Album ${albumIndex + 1}`;
                        const searchable = [
                            albumMeta.id,
                            albumMeta.title_he,
                            albumMeta.title_en,
                            albumMeta.author,
                            albumMeta.publisher,
                            albumMeta.year,
                            parsed.Scene,
                            parsed.Vibe,
                            parsed.Objects,
                            parsed.Actions,
                            parsed.People,
                            parsed.Caption,
                            parsed.Description,
                            parsed.Text,
                            img.short_caption,
                            img.ocr_text,
                            img.ocr_translation
                        ].filter(Boolean).join(' ').toLowerCase();
                        return {
                            ...img,
                            parsedMetadata: parsed,
                            albumIndex,
                            albumMeta,
                            titleHe,
                            titleEn,
                            searchable
                        };
                    });
                });
            }, [albums]);

            const tokens = useMemo(() => {
                return query.trim().toLowerCase().split(/\s+/).filter(Boolean);
            }, [query]);

            const canSearch = tokens.length > 0;

            const results = useMemo(() => {
                if (!canSearch) return [];
                const rows = dataset.filter(item => albumFilter === 'all' || String(item.albumIndex) === albumFilter);
                const scored = rows.map((item) => {
                    let score = 0;
                    tokens.forEach((token) => {
                        if (item.searchable.includes(token)) score += 1;
                        if ((item.parsedMetadata.Scene || '').toLowerCase().includes(token)) score += 2;
                        if ((item.parsedMetadata.Objects || '').toLowerCase().includes(token)) score += 2;
                        if ((item.parsedMetadata.Vibe || '').toLowerCase().includes(token)) score += 2;
                    });
                    return score > 0 ? { ...item, _score: score } : null;
                }).filter(Boolean);

                scored.sort((a, b) => {
                    if (b._score !== a._score) return b._score - a._score;
                    if (a.albumIndex !== b.albumIndex) return a.albumIndex - b.albumIndex;
                    return (a.image_num || 0) - (b.image_num || 0);
                });

                return scored.slice(0, 320);
            }, [dataset, tokens, albumFilter, canSearch]);

            const selected = focusedIndex === null ? null : results[focusedIndex] || null;

            return (
                <div className="h-full flex flex-col bg-slate-50 fade-in">
                    <div className="bg-white border-b border-slate-200 p-4 md:p-5 shrink-0 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-wrap items-center gap-3">
                            <div className="relative flex-1 min-w-[240px]">
                                <i className="ph-bold ph-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                <input
                                    type="text"
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    placeholder={lang === 'he' ? 'חיפוש חוצה-קורפוס: סצנה, אובייקט, כיתוב, OCR, מחבר...' : 'Cross-corpus search: scene, object, caption, OCR, author...'}
                                    className="w-full border border-slate-300 rounded-xl pr-10 pl-4 py-2.5 text-sm focus:outline-none focus:border-blue-400"
                                    dir="auto"
                                />
                            </div>
                            <select
                                value={albumFilter}
                                onChange={(e) => setAlbumFilter(e.target.value)}
                                className="border border-slate-300 rounded-xl py-2.5 px-3 text-sm font-bold text-slate-700 bg-white"
                                dir="auto"
                            >
                                <option value="all">{lang === 'he' ? 'כל האלבומים' : 'All albums'}</option>
                                {albums.map((al, idx) => (
                                    <option key={idx} value={String(idx)}>
                                        {lang === 'he' ? (al.album?.title_he || al.album?.title_en || `אלבום ${idx + 1}`) : (al.album?.title_en || al.album?.title_he || `Album ${idx + 1}`)}
                                    </option>
                                ))}
                            </select>
                            <div className="text-xs font-bold text-slate-500 bg-slate-100 rounded-full px-3 py-1.5">
                                {canSearch ? `${results.length} ${lang === 'he' ? 'תוצאות' : 'results'}` : (lang === 'he' ? 'הקלידו מילת חיפוש' : 'Type to search')}
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6">
                        <div className="max-w-7xl mx-auto pb-20">
                            {!canSearch && (
                                <div className="bg-white border border-slate-200 rounded-2xl p-8 text-center text-slate-500">
                                    <i className="ph-fill ph-compass text-5xl text-blue-500 mb-3"></i>
                                    <p className="text-lg font-bold mb-1">{lang === 'he' ? 'חיפוש כללי על כלל הקורפוס' : 'Global search across the full corpus'}</p>
                                    <p className="text-sm">{lang === 'he' ? 'המערכת מחפשת יחד: מטא-דאטה של אלבומים, שדות Scene / Objects / Vibe / Actions, כיתובים ו-OCR.' : 'Search combines album metadata, Scene/Objects/Vibe/Actions fields, captions and OCR.'}</p>
                                </div>
                            )}

                            {canSearch && results.length === 0 && (
                                <div className="bg-white border border-slate-200 rounded-2xl p-8 text-center text-slate-500">
                                    <i className="ph-fill ph-magnifying-glass-minus text-5xl mb-3"></i>
                                    <p className="text-lg font-bold">{lang === 'he' ? 'לא נמצאו תוצאות' : 'No results found'}</p>
                                </div>
                            )}

                            {canSearch && results.length > 0 && (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                    {results.map((item, idx) => (
                                        <div key={`${item.image_id}-${idx}`} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                            <button onClick={() => setFocusedIndex(idx)} className="w-full h-56 bg-slate-100 block">
                                                <OptimizedImage src={getImgSrcCandidates(item)} alt={`${item.titleEn} page ${item.image_num || '?'}`} className="w-full h-full object-cover" />
                                            </button>
                                            <div className="p-3 space-y-2">
                                                <div className="text-xs text-slate-500 font-bold" dir="auto">
                                                    {lang === 'he' ? item.titleHe : item.titleEn}
                                                    {item.albumMeta?.year ? ` · ${item.albumMeta.year}` : ''}
                                                </div>
                                                <div className="text-sm font-black text-slate-800">
                                                    {lang === 'he' ? `עמוד ${item.image_num || '?'}` : `Page ${item.image_num || '?'}`} · Score {item._score}
                                                </div>
                                                <div className="flex flex-wrap gap-1.5 text-[11px]">
                                                    {item.parsedMetadata.Scene && <span className="px-2 py-0.5 rounded-full bg-blue-50 text-blue-700 border border-blue-200">{item.parsedMetadata.Scene.split(',')[0].trim()}</span>}
                                                    {item.parsedMetadata.Vibe && <span className="px-2 py-0.5 rounded-full bg-purple-50 text-purple-700 border border-purple-200">{item.parsedMetadata.Vibe.split(',')[0].trim()}</span>}
                                                </div>
                                                <button
                                                    onClick={() => onOpenAlbum && onOpenAlbum(item.albumIndex)}
                                                    className="w-full text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg"
                                                >
                                                    {lang === 'he' ? 'פתח אלבום בגלריה' : 'Open album in gallery'}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {selected && (
                        <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-sm p-4 md:p-8 fade-in" onClick={() => setFocusedIndex(null)}>
                            <div className="max-w-6xl mx-auto h-full bg-white rounded-2xl overflow-hidden grid grid-cols-1 lg:grid-cols-[1.4fr,1fr]" onClick={(e) => e.stopPropagation()}>
                                <div className="bg-slate-100 flex items-center justify-center p-6">
                                    <OptimizedImage src={getImgSrcCandidates(selected)} alt={selected.titleEn} eager={true} className="max-w-full max-h-full object-contain" />
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-xl font-black text-slate-900" dir="auto">{lang === 'he' ? selected.titleHe : selected.titleEn}</h3>
                                        <button onClick={() => setFocusedIndex(null)} className="bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-lg text-sm font-bold">{lang === 'he' ? 'סגור' : 'Close'}</button>
                                    </div>
                                    <p className="text-sm text-slate-500 mb-4">{lang === 'he' ? `עמוד ${selected.image_num || '?'}` : `Page ${selected.image_num || '?'}`} · Score {selected._score}</p>

                                    <div className="space-y-3 text-sm">
                                        {['Scene', 'Objects', 'Vibe', 'People', 'Actions'].map((k) => selected.parsedMetadata[k] && (
                                            <div key={k}>
                                                <div className="text-[11px] uppercase tracking-wider text-slate-400 font-black mb-1">{k}</div>
                                                <div className="text-slate-700" dir="auto">{selected.parsedMetadata[k]}</div>
                                            </div>
                                        ))}
                                        {selected.parsedMetadata.Caption && (
                                            <div>
                                                <div className="text-[11px] uppercase tracking-wider text-amber-500 font-black mb-1">Caption</div>
                                                <div className="text-slate-700" dir="auto">{selected.parsedMetadata.Caption}</div>
                                            </div>
                                        )}
                                        {selected.parsedMetadata.Text && (
                                            <div>
                                                <div className="text-[11px] uppercase tracking-wider text-purple-500 font-black mb-1">OCR</div>
                                                <div className="text-slate-700 font-mono" dir="ltr">{selected.parsedMetadata.Text}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // TAB 5: אודות המערכת (About)
        // ==========================================
        const AboutTab = ({ lang = 'he' }) => {
            return (
                <div className="h-full overflow-y-auto bg-slate-50 p-6 md:p-10 fade-in">
                    <div className="max-w-5xl mx-auto space-y-6 pb-12">
                        <div className="bg-white border border-slate-200 rounded-3xl p-7 md:p-10 shadow-sm">
                            <h2 className="text-3xl md:text-4xl font-black text-slate-900 mb-4 flex items-center gap-3">
                                <i className="ph-fill ph-info text-blue-600"></i>
                                {lang === 'he' ? 'אודות המערכת' : 'About This System'}
                            </h2>
                            <p className="text-slate-700 leading-relaxed mb-4" dir={lang === 'he' ? 'rtl' : 'ltr'}>
                                {lang === 'he'
                                    ? 'המערכת נבנתה כחלק מפרויקט העוסק בניתוח "אלבומי תמונות לאומיים של מדינת ישראל".'
                                    : 'This system was built as part of a project on analyzing national photo albums of the State of Israel.'}
                            </p>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                    <div className="text-slate-500 font-bold mb-1">{lang === 'he' ? 'הנחיה' : 'Supervision'}</div>
                                    <div className="text-slate-800" dir="auto">ד"ר אליעזר באומגרטן (מעבדת אליהו, אוניברסיטת חיפה)</div>
                                    <div className="text-slate-800" dir="auto">פרופסור גליה ינושבסקי ופרופסור רועי גלברד (אוניברסיטת בר-אילן)</div>
                                </div>
                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                                    <div className="text-slate-500 font-bold mb-1">{lang === 'he' ? 'חילוץ דאטה' : 'Data Extraction'}</div>
                                    <div className="text-slate-800" dir="auto">רון אלקובי</div>
                                    <div className="text-slate-500 font-bold mt-3 mb-1">{lang === 'he' ? 'יצירת קשר' : 'Contact'}</div>
                                    <div className="text-slate-800" dir="ltr">beliezer [at] staff.haifa.ac.il</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // VIZ 15: פעולות – Actions Frequency Chart
        // ==========================================
        const ActionsFrequency = ({ images }) => {
            const [ttipA, setTtipA] = useState(null);
            const freq = useMemo(() => {
                const counts = {};
                images.forEach(img => {
                    const raw = img.parsedMetadata.Actions || '';
                    if (!raw) return;
                    raw.split(',').forEach(a => {
                        const t = a.trim().toLowerCase();
                        if (t.length > 2) counts[t] = (counts[t] || 0) + 1;
                    });
                });
                return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 25);
            }, [images]);

            if (freq.length === 0) return null;
            const max = freq[0][1];

            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                    <h3 className="text-2xl font-black text-slate-800 flex items-center gap-3 mb-2">
                        <i className="ph-fill ph-person-simple-run text-orange-500"></i> {useLang() === 'he' ? 'תדירות פעולות (Actions)' : 'Actions Frequency'}
                    </h3>
                    <BilingualTheoryBox
                        titleHe="כוריאוגרפיה חוזרת של גורמי האלבום"
                        titleEn="Recurring Choreography of Album Agents"
                        fields="Actions"
                        fieldMapHe={[{field:'Actions', action:'רשימה מופרדת בפסיקים של פעולות ספציפיות שזוהו ע"י מודל ראייה ממוחשבת לכל תמונה.'}]}
                        fieldMapEn={[{field:'Actions', action:'Comma-separated list of specific agent behaviors detected by CV model per image.'}]}
                        stepsHe={['חלוקה לפריטים בפסיק','נרמול (lowercase + trim)','ספירת תדירות','סינון <3 אותיות','מיון יורד','25 ראשונות']}
                        stepsEn={['Split on comma','Normalize (lowercase + trim)','Count frequency','Filter short tokens','Sort descending','Top 25 shown']}
                        algoHe="היסטוגרמה של מחרוזות פעולה מהשדה Actions, משוקללת לפי מספר הופעות."
                        algoEn="Histogram of action strings from the Actions field, weighted by occurrence count."
                        claimHe="חושף את פרופיל הפעילות של הגורמים: פסיביות (יושב, עומד) לעומת אקטיביות (הולך, אוחז)? צבאי לעומת אזרחי?"
                        claimEn="Reveals actor activity profiles: passive (sitting, standing) vs. active (walking, holding)? Military vs. civilian?"
                    />
                    <div className="mt-6 space-y-1.5" dir="ltr">
                        {freq.map(([action, count], i) => {
                            const pct = (count / max) * 100;
                            const hue = [...action.slice(0, 6)].reduce((h, c) => (h * 31 + c.charCodeAt(0)) & 0xffff, 0) % 360;
                            const color = `hsl(${hue},58%,50%)`;
                            return (
                                <div key={action} className="flex items-center gap-3 group cursor-default"
                                    onMouseEnter={(e) => setTtipA({ x: e.clientX, y: e.clientY, content: `${action}\n${count} הופעות\n${((count/images.length)*100).toFixed(1)}% מהעמודים` })}
                                    onMouseMove={(e) => setTtipA(p => p ? {...p, x: e.clientX, y: e.clientY} : null)}
                                    onMouseLeave={() => setTtipA(null)}>
                                    <span className="text-xs text-slate-600 font-mono w-48 text-left truncate shrink-0" title={action}>{action}</span>
                                    <div className="flex-1 h-4 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full rounded-full transition-all duration-200 opacity-80 group-hover:opacity-100"
                                             style={{ width: `${pct}%`, backgroundColor: color }}></div>
                                    </div>
                                    <span className="text-xs text-slate-400 font-mono w-7 text-right shrink-0">{count}</span>
                                </div>
                            );
                        })}
                    </div>
                    <ChartTooltip tooltip={ttipA} />
                </div>
            );
        };

        // ==========================================
        // TAB 3: Distant Reading - Corpus vs Group / Group vs Group
        // ==========================================
        const ComparisonTab = ({ albums, lang = 'he' }) => {
            const [compareMode, setCompareMode] = useState('modalities');
            const comparisonType = 'group-group';

            const createInitialGroup = (albumIdx = 0, mode = 'album') => ({
                mode,
                albumIdx,
                selectedAlbumIdxs: [albumIdx],
                year: '',
                author: '',
                publisher: '',
                customField: 'id',
                customValue: ''
            });

            const [groupA, setGroupA] = useState(() => createInitialGroup(0, 'all'));
            const [groupB, setGroupB] = useState(() => createInitialGroup(1, 'manual'));

            const years = useMemo(() => {
                return [...new Set(albums.map(a => String(a.album?.year || '')).filter(Boolean))].sort();
            }, [albums]);

            const authors = useMemo(() => {
                return [...new Set(albums.map(a => (a.album?.author || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
            }, [albums]);

            const publishers = useMemo(() => {
                return [...new Set(albums.map(a => (a.album?.publisher || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
            }, [albums]);

            React.useEffect(() => {
                const maxIdx = Math.max(0, albums.length - 1);
                setGroupA(prev => ({
                    ...prev,
                    albumIdx: Math.min(prev.albumIdx, maxIdx),
                    selectedAlbumIdxs: (prev.selectedAlbumIdxs || []).filter(i => i >= 0 && i <= maxIdx)
                }));
                setGroupB(prev => ({
                    ...prev,
                    albumIdx: Math.min(prev.albumIdx, maxIdx),
                    selectedAlbumIdxs: (prev.selectedAlbumIdxs || []).filter(i => i >= 0 && i <= maxIdx)
                }));
            }, [albums.length]);

            React.useEffect(() => {
                if (!years.length) return;
                setGroupA(prev => (prev.year ? prev : { ...prev, year: years[0] }));
                setGroupB(prev => (prev.year ? prev : { ...prev, year: years[0] }));
            }, [years]);

            React.useEffect(() => {
                if (!authors.length) return;
                setGroupA(prev => (prev.author ? prev : { ...prev, author: authors[0] }));
                setGroupB(prev => (prev.author ? prev : { ...prev, author: authors[0] }));
            }, [authors]);

            React.useEffect(() => {
                if (!publishers.length) return;
                setGroupA(prev => (prev.publisher ? prev : { ...prev, publisher: publishers[0] }));
                setGroupB(prev => (prev.publisher ? prev : { ...prev, publisher: publishers[0] }));
            }, [publishers]);

            const filterAlbumsByGroup = React.useCallback((group) => {
                if (group.mode === 'all') {
                    return albums;
                }
                if (group.mode === 'manual') {
                    const selected = new Set(group.selectedAlbumIdxs || []);
                    return albums.filter((_, idx) => selected.has(idx));
                }
                if (group.mode === 'album') {
                    return albums[group.albumIdx] ? [albums[group.albumIdx]] : [];
                }
                if (group.mode === 'year') {
                    return albums.filter(a => String(a.album?.year || '') === group.year);
                }
                if (group.mode === 'author') {
                    return albums.filter(a => (a.album?.author || '').trim() === group.author);
                }
                if (group.mode === 'publisher') {
                    return albums.filter(a => (a.album?.publisher || '').trim() === group.publisher);
                }
                if (group.mode === 'custom') {
                    const field = group.customField.trim();
                    const value = group.customValue.trim().toLowerCase();
                    if (!field || !value) return [];
                    return albums.filter((a) => {
                        const raw = readAlbumField(a.album || {}, field).toLowerCase();
                        return raw.includes(value);
                    });
                }
                return [];
            }, [albums]);

            const buildGroupLabel = React.useCallback((group) => {
                if (group.mode === 'all') {
                    return lang === 'he' ? 'כל האלבומים' : 'All albums';
                }
                if (group.mode === 'manual') {
                    const n = (group.selectedAlbumIdxs || []).length;
                    return lang === 'he' ? `בחירה ידנית: ${n} אלבומים` : `Manual selection: ${n} albums`;
                }
                if (group.mode === 'album') {
                    const a = albums[group.albumIdx];
                    return a ? (a.album?.title_he || a.album?.title_en || (lang === 'he' ? 'אלבום' : 'Album')) : (lang === 'he' ? 'אלבום' : 'Album');
                }
                if (group.mode === 'year') return lang === 'he' ? `שנה: ${group.year || '-'}` : `Year: ${group.year || '-'}`;
                if (group.mode === 'author') return lang === 'he' ? `מחבר: ${group.author || '-'}` : `Author: ${group.author || '-'}`;
                if (group.mode === 'publisher') return lang === 'he' ? `מו"ל: ${group.publisher || '-'}` : `Publisher: ${group.publisher || '-'}`;
                return lang === 'he'
                    ? `מסנן מותאם: ${group.customField || '-'} כולל "${group.customValue || ''}"`
                    : `Custom filter: ${group.customField || '-'} contains "${group.customValue || ''}"`;
            }, [albums, lang]);

            const groupAAlbums = useMemo(() => filterAlbumsByGroup(groupA), [filterAlbumsByGroup, groupA]);
            const groupBAlbums = useMemo(() => filterAlbumsByGroup(groupB), [filterAlbumsByGroup, groupB]);

            const leftAlbums = useMemo(() => {
                return comparisonType === 'corpus-group' ? albums : groupAAlbums;
            }, [comparisonType, albums, groupAAlbums]);

            const rightAlbums = useMemo(() => {
                return comparisonType === 'corpus-group' ? groupAAlbums : groupBAlbums;
            }, [comparisonType, groupAAlbums, groupBAlbums]);

            const leftImages = useMemo(() => normalizeAlbumImages(leftAlbums), [leftAlbums]);
            const rightImages = useMemo(() => normalizeAlbumImages(rightAlbums), [rightAlbums]);

            const leftLabel = useMemo(() => {
                return comparisonType === 'corpus-group'
                    ? (lang === 'he' ? 'כל האלבומים יחד' : 'All albums together')
                    : buildGroupLabel(groupA);
            }, [comparisonType, lang, buildGroupLabel, groupA]);

            const rightLabel = useMemo(() => {
                return comparisonType === 'corpus-group' ? buildGroupLabel(groupA) : buildGroupLabel(groupB);
            }, [comparisonType, buildGroupLabel, groupA, groupB]);

            const leftTitle = comparisonType === 'corpus-group'
                ? (lang === 'he' ? 'המכלול הכללי' : 'Full Corpus')
                : (lang === 'he' ? 'קבוצה A' : 'Group A');

            const rightTitle = comparisonType === 'corpus-group'
                ? (lang === 'he' ? 'קבוצה להשוואה' : 'Comparison Group')
                : (lang === 'he' ? 'קבוצה B' : 'Group B');

            if (albums.length === 0) {
                return (
                    <div className="flex flex-col items-center justify-center h-full text-slate-400 p-12 text-center bg-slate-50">
                        <i className="ph-fill ph-warning text-6xl mb-6 opacity-30"></i>
                        <h2 className="text-3xl font-bold text-slate-600 mb-4">{lang === 'he' ? 'לא נטענו אלבומים' : 'No albums loaded'}</h2>
                    </div>
                );
            }

            const rightPctOfLeft = leftImages.length ? ((rightImages.length / leftImages.length) * 100) : 0;

            const renderGroupControls = (group, setGroup, labelText) => {
                return (
                    <div className="bg-white border border-slate-200 rounded-2xl p-3 md:p-4">
                        <div className="text-xs font-black text-slate-500 mb-2">{labelText}</div>
                        <div className="flex flex-wrap items-center gap-2">
                            <select
                                value={group.mode}
                                onChange={(e) => setGroup(prev => ({ ...prev, mode: e.target.value }))}
                                className="border border-slate-300 rounded-xl py-2 px-3 text-sm font-bold bg-white"
                            >
                                <option value="all">{lang === 'he' ? 'הכל (כל האלבומים)' : 'All albums'}</option>
                                <option value="manual">{lang === 'he' ? 'בחירה ידנית (בוקסים)' : 'Manual selection (checkboxes)'}</option>
                                <option value="album">{lang === 'he' ? 'אלבום יחיד' : 'Single album'}</option>
                                <option value="year">{lang === 'he' ? 'לפי שנה' : 'By year'}</option>
                                <option value="author">{lang === 'he' ? 'לפי מחבר' : 'By author'}</option>
                                <option value="publisher">{lang === 'he' ? 'לפי מו"ל' : 'By publisher'}</option>
                                <option value="custom">{lang === 'he' ? 'שדה מטא-דאטה מותאם' : 'Custom metadata field'}</option>
                            </select>

                            {group.mode === 'manual' && (
                                <div className="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 max-h-56 overflow-y-auto">
                                    <div className="flex items-center gap-3 px-2 pb-2 mb-1 border-b border-slate-200 text-xs font-bold">
                                        <button
                                            type="button"
                                            onClick={() => setGroup(prev => ({ ...prev, selectedAlbumIdxs: albums.map((_, i) => i) }))}
                                            className="text-blue-600 hover:underline"
                                        >
                                            {lang === 'he' ? 'בחר הכל' : 'Select all'}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setGroup(prev => ({ ...prev, selectedAlbumIdxs: [] }))}
                                            className="text-slate-500 hover:underline"
                                        >
                                            {lang === 'he' ? 'נקה הכל' : 'Clear'}
                                        </button>
                                    </div>
                                    <div className="space-y-1">
                                        {albums.map((a, idx) => {
                                            const checked = (group.selectedAlbumIdxs || []).includes(idx);
                                            return (
                                                <label key={idx} className="flex items-center gap-2 px-2 py-1 rounded hover:bg-white cursor-pointer" dir="auto">
                                                    <input
                                                        type="checkbox"
                                                        checked={checked}
                                                        onChange={() => setGroup(prev => {
                                                            const existing = new Set(prev.selectedAlbumIdxs || []);
                                                            if (existing.has(idx)) existing.delete(idx);
                                                            else existing.add(idx);
                                                            return { ...prev, selectedAlbumIdxs: [...existing].sort((aI, bI) => aI - bI) };
                                                        })}
                                                        className="accent-blue-600"
                                                    />
                                                    <span className="text-sm text-slate-700 truncate">
                                                        {lang === 'he'
                                                            ? (a.album?.title_he || a.album?.title_en || `אלבום ${idx + 1}`)
                                                            : (a.album?.title_en || a.album?.title_he || `Album ${idx + 1}`)}
                                                    </span>
                                                </label>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}

                            {group.mode === 'album' && (
                                <select
                                    value={group.albumIdx}
                                    onChange={(e) => setGroup(prev => ({ ...prev, albumIdx: Number(e.target.value) }))}
                                    className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white"
                                    dir="auto"
                                >
                                    {albums.map((a, idx) => (
                                        <option key={idx} value={idx}>
                                            {lang === 'he'
                                                ? (a.album?.title_he || a.album?.title_en || `אלבום ${idx + 1}`)
                                                : (a.album?.title_en || a.album?.title_he || `Album ${idx + 1}`)}
                                        </option>
                                    ))}
                                </select>
                            )}

                            {group.mode === 'year' && (
                                <select
                                    value={group.year}
                                    onChange={(e) => setGroup(prev => ({ ...prev, year: e.target.value }))}
                                    className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white"
                                >
                                    {years.map(y => <option key={y} value={y}>{y}</option>)}
                                </select>
                            )}

                            {group.mode === 'author' && (
                                <select
                                    value={group.author}
                                    onChange={(e) => setGroup(prev => ({ ...prev, author: e.target.value }))}
                                    className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white"
                                    dir="auto"
                                >
                                    {authors.map(v => <option key={v} value={v}>{v}</option>)}
                                </select>
                            )}

                            {group.mode === 'publisher' && (
                                <select
                                    value={group.publisher}
                                    onChange={(e) => setGroup(prev => ({ ...prev, publisher: e.target.value }))}
                                    className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white"
                                    dir="auto"
                                >
                                    {publishers.map(v => <option key={v} value={v}>{v}</option>)}
                                </select>
                            )}

                            {group.mode === 'custom' && (
                                <>
                                    <input
                                        value={group.customField}
                                        onChange={(e) => setGroup(prev => ({ ...prev, customField: e.target.value }))}
                                        placeholder={lang === 'he' ? 'שם שדה (למשל: title_en)' : 'Field name (e.g. title_en)'}
                                        className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white min-w-[170px]"
                                        dir="auto"
                                    />
                                    <input
                                        value={group.customValue}
                                        onChange={(e) => setGroup(prev => ({ ...prev, customValue: e.target.value }))}
                                        placeholder={lang === 'he' ? 'ערך לחיפוש' : 'Value to match'}
                                        className="border border-slate-300 rounded-xl py-2 px-3 text-sm bg-white min-w-[190px]"
                                        dir="auto"
                                    />
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col bg-slate-50 fade-in">
                    <div className="bg-white border-b border-slate-200 p-4 md:p-5 shrink-0 shadow-sm z-10">
                        <div className="max-w-7xl mx-auto space-y-3">
                            <div className="flex flex-wrap items-center gap-2">
                                <span className="text-sm font-bold text-slate-500">{lang === 'he' ? 'פיצ׳ר לניתוח:' : 'Feature:'}</span>
                                <select
                                    value={compareMode}
                                    onChange={(e) => setCompareMode(e.target.value)}
                                    className="border border-slate-300 rounded-xl py-2 px-3 text-sm font-bold bg-white"
                                >
                                    {VIZ_OPTIONS.map(o => (
                                        <option key={o.id} value={o.id}>{lang === 'he' ? o.labelHe : o.labelEn}</option>
                                    ))}
                                </select>
                            </div>

                            <div className={`grid grid-cols-1 ${comparisonType === 'group-group' ? 'xl:grid-cols-2' : ''} gap-3`}>
                                {renderGroupControls(
                                    groupA,
                                    setGroupA,
                                    comparisonType === 'corpus-group'
                                        ? (lang === 'he' ? 'הגדרת הקבוצה להשוואה' : 'Comparison group setup')
                                        : (lang === 'he' ? 'הגדרת קבוצה A' : 'Group A setup')
                                )}
                                {comparisonType === 'group-group' && renderGroupControls(groupB, setGroupB, lang === 'he' ? 'הגדרת קבוצה B' : 'Group B setup')}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                                <div className="bg-slate-100 border border-slate-200 rounded-xl px-3 py-2 text-slate-700 font-bold" dir="auto">
                                    {lang === 'he'
                                        ? `${leftTitle}: ${leftAlbums.length} אלבומים, ${leftImages.length} תמונות`
                                        : `${leftTitle}: ${leftAlbums.length} albums, ${leftImages.length} images`}
                                </div>
                                <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 text-blue-800 font-bold" dir="auto">
                                    {lang === 'he'
                                        ? `${rightTitle}: ${rightAlbums.length} אלבומים, ${rightImages.length} תמונות`
                                        : `${rightTitle}: ${rightAlbums.length} albums, ${rightImages.length} images`}
                                </div>
                                <div className="bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2 text-emerald-800 font-bold">
                                    {comparisonType === 'corpus-group'
                                        ? (lang === 'he' ? `יחס קבוצה מתוך מכלול: ${rightPctOfLeft.toFixed(1)}%` : `Group share in corpus: ${rightPctOfLeft.toFixed(1)}%`)
                                        : (lang === 'he' ? `יחס קבוצה B מתוך קבוצה A: ${rightPctOfLeft.toFixed(1)}%` : `Group B share in Group A: ${rightPctOfLeft.toFixed(1)}%`)}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6">
                        <div className="max-w-[1400px] mx-auto grid grid-cols-1 xl:grid-cols-2 gap-6 pb-20">
                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="px-5 py-3 bg-slate-900 text-white" dir="auto">
                                    <h3 className="font-black text-lg">{leftTitle}</h3>
                                    <p className="text-xs opacity-75">{leftLabel}</p>
                                </div>
                                <div className="p-5">
                                    {leftImages.length > 0
                                        ? renderVisualizationByMode(compareMode, leftImages, null)
                                        : <div className="text-sm text-slate-400">{lang === 'he' ? 'אין נתונים להצגה' : 'No data to display'}</div>}
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="px-5 py-3 bg-blue-600 text-white" dir="auto">
                                    <h3 className="font-black text-lg">{rightTitle}</h3>
                                    <p className="text-xs opacity-90">{rightLabel}</p>
                                </div>
                                <div className="p-5">
                                    {rightImages.length > 0 ? (
                                        renderVisualizationByMode(compareMode, rightImages, null)
                                    ) : (
                                        <div className="bg-slate-50 border border-dashed border-slate-300 rounded-xl p-6 text-center text-slate-500 text-sm">
                                            {lang === 'he' ? 'לא נמצאו פריטים בקבוצה הזו. נסו לשנות את המסנן.' : 'No items matched this group. Try another filter.'}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // --- App Component ---
        function App() {
            const [albums, setAlbums] = useState([]);
            const [activeAlbumIndex, setActiveAlbumIndex] = useState(0);
            const [activeTab, setActiveTab] = useState('library'); // library, gallery, dv, compare, search, about
            const [globalFilter, setGlobalFilter] = useState({tag: null, category: null});
            const [autoLoading, setAutoLoading] = useState(true);
            const [lang, setLang] = useState('he'); // 'he' | 'en'

            // Auto-load albums — server mode (localhost) or static mode (GitHub Pages)
            React.useEffect(() => {
                if (window.location.protocol === 'file:') {
                    setAutoLoading(false);
                    return;
                }
                const processAlbums = (data) => {
                    if (!Array.isArray(data) || data.length === 0) { setAutoLoading(false); return; }
                    const enhanced = data.map(json => ({
                        ...json,
                        images: (json.images || [])
                            .map(img => ({ ...img, parsedMetadata: parseCaptionString(img.caption) }))
                            .sort((a, b) => a.image_num - b.image_num)
                    }));
                    setAlbums(enhanced);
                    setAutoLoading(false);
                };
                // Try server API first (node server.js)
                fetch('/api/albums')
                    .then(r => { if (!r.ok) throw new Error('no-server'); return r.json(); })
                    .then(processAlbums)
                    .catch(() => {
                        // Static fallback (GitHub Pages): load albums_list.json then each album JSON
                        fetch('albums_list.json')
                            .then(r => r.json())
                            .then(names => Promise.all(
                                names.map(n => fetch(encodeURIComponent(n))
                                    .then(r => r.ok ? r.json() : null)
                                    .catch(() => null))
                            ))
                            .then(results => processAlbums(results.filter(Boolean)))
                            .catch(() => setAutoLoading(false));
                    });
            }, []);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        const enhancedImages = (json.images || []).map(img => ({ ...img, parsedMetadata: parseCaptionString(img.caption) })).sort((a, b) => a.image_num - b.image_num);
                        setAlbums(prev => [...prev, { ...json, images: enhancedImages }]);
                        setActiveAlbumIndex(albums.length); 
                    } catch (error) { alert('שגיאה בקריאת הקובץ.'); }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            const jumpToGalleryWithTag = (tag, category) => {
                setGlobalFilter({ tag, category });
                setActiveTab('gallery');
            };

            if (albums.length === 0) {
                return (
                    <div className="h-full bg-slate-900 flex flex-col items-center justify-center p-6">
                        <div className="bg-slate-800 p-16 rounded-[3rem] shadow-2xl max-w-4xl w-full text-center border border-slate-700">
                            <div className="w-24 h-24 bg-gradient-to-br from-blue-600 to-purple-600 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-lg transform rotate-3">
                                <i className="ph-bold ph-books text-5xl text-white"></i>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-black text-white mb-6 tracking-tight">אלבומי תמונות לאומיים של מדינת ישראל</h1>
                            <p className="text-slate-400 mb-10 text-lg leading-relaxed max-w-2xl mx-auto">
                                אוניברסיטת בר-אילן · אוניברסיטת חיפה<br/>
                                מערכת מחקר המשלבת 15 ויזואליזציות לקריאה מרחוק, חיפוש כללי, והשוואת מכלול מול תת-קבוצות.
                            </p>
                            {autoLoading ? (
                                <div className="flex flex-col items-center gap-4 text-slate-300">
                                    <svg className="animate-spin w-10 h-10 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                                    </svg>
                                    <span className="text-lg font-bold">טוען אלבומים אוטומטית...</span>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-4">
                                    {window.location.protocol === 'file:' && (
                                        <p className="text-amber-400 text-sm mb-2 max-w-lg">
                                            הקובץ נפתח ישירות מהדיסק. להפעלה אוטומטית עם טעינת תמונות מהירה: פתח Terminal בתיקייה <strong>Israel_Album</strong> והרץ <code>node server.js</code>, ואז פתח <a href="http://localhost:4040" className="underline text-blue-400">http://localhost:4040</a>
                                        </p>
                                    )}
                                    <label className="cursor-pointer bg-white hover:bg-slate-100 text-slate-900 py-4 px-10 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-4 text-xl font-bold inline-flex">
                                        <i className="ph-bold ph-upload-simple text-3xl text-blue-600"></i>
                                        <span>העלאת קובץ אלבום (JSON) ידנית</span>
                                        <input type="file" accept=".json" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const activeAlbum = albums[activeAlbumIndex];

            return (
                <LangContext.Provider value={lang}>
                <div className="flex-1 flex flex-col overflow-hidden bg-slate-50">
                    <header className="bg-slate-900 text-white px-8 py-4 flex flex-wrap gap-4 justify-between items-center z-20 shrink-0 shadow-lg">
                        <div className="flex items-center gap-8">
                            <h1 className="text-xl font-black tracking-tight flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center"><i className="ph-bold ph-books text-white text-xl"></i></div>
                                {lang === 'he' ? 'אלבומי תמונות לאומיים' : 'National Photo Albums of Israel'}
                                <span className="text-[10px] uppercase tracking-wider bg-blue-500/30 border border-blue-400/60 text-blue-100 px-2 py-1 rounded-full">V2</span>
                            </h1>

                            <div className="bg-slate-800 p-1.5 rounded-2xl flex flex-wrap gap-0.5">
                                <button onClick={() => setActiveTab('library')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'library' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-books text-lg"></i> {lang === 'he' ? '0. ספרייה' : '0. Library'}
                                </button>
                                <button onClick={() => setActiveTab('gallery')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'gallery' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-images text-lg"></i> {lang === 'he' ? '1. גלריה' : '1. Gallery'}
                                </button>
                                <button onClick={() => setActiveTab('dv')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'dv' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-presentation-chart text-lg"></i> {lang === 'he' ? '2. קריאה מרחוק' : '2. Distant Reading'}
                                </button>
                                <button onClick={() => setActiveTab('compare')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'compare' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-scales text-lg"></i> {lang === 'he' ? '3. מכלול מול קבוצה' : '3. Corpus vs Subset'}
                                    {albums.length > 1 && <span className="bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-1">{albums.length}</span>}
                                </button>
                                <button onClick={() => setActiveTab('search')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'search' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-magnifying-glass text-lg"></i> {lang === 'he' ? '4. חיפוש כללי' : '4. Global Search'}
                                </button>
                                <button onClick={() => setActiveTab('about')} className={`flex items-center gap-2 px-5 py-2 rounded-xl font-bold transition-all text-sm ${activeTab === 'about' ? 'bg-white text-slate-900 shadow' : 'text-slate-400 hover:text-white'}`}>
                                    <i className="ph-bold ph-info text-lg"></i> {lang === 'he' ? '5. אודות' : '5. About'}
                                </button>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button
                                onClick={() => setLang(l => l === 'he' ? 'en' : 'he')}
                                className="bg-slate-700 hover:bg-slate-600 text-white py-2 px-4 rounded-xl transition-all flex items-center gap-2 text-sm font-bold border border-slate-600 hover:border-slate-500"
                                title={lang === 'he' ? 'Switch to English' : 'עבור לעברית'}
                            >
                                <i className="ph-bold ph-translate"></i>
                                {lang === 'he' ? 'EN' : 'עב'}
                            </button>
                            <label className="cursor-pointer bg-slate-700 hover:bg-slate-600 text-white py-2 px-5 rounded-xl transition-all flex items-center justify-center gap-2 text-sm font-bold border border-slate-600 hover:border-slate-500">
                                <i className="ph-bold ph-plus"></i> {lang === 'he' ? 'הוספת אלבום למעבדה' : 'Add Album'}
                                <input type="file" accept=".json" className="hidden" onChange={handleFileUpload} />
                            </label>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden relative">
                        {activeTab === 'library' && (
                            <LibraryTab
                                albums={albums}
                                lang={lang}
                                onGallery={idx => { setActiveAlbumIndex(idx); setActiveTab('gallery'); }}
                                onAnalyze={idx => { setActiveAlbumIndex(idx); setActiveTab('dv'); }}
                            />
                        )}
                        {activeTab === 'gallery' && (
                            <GalleryTab albums={albums} activeAlbumIndex={activeAlbumIndex} onAlbumChange={setActiveAlbumIndex} filter={globalFilter} setFilter={setGlobalFilter} lang={lang} />
                        )}
                        
                        {activeTab === 'dv' && activeAlbum && (
                            <div className="h-full flex flex-col bg-slate-50 fade-in">
                                {/* Album selector dropdown */}
                                <div className="bg-white border-b border-slate-200 px-6 py-3 flex items-center gap-3 shrink-0 shadow-sm">
                                    <i className="ph-fill ph-book-open text-blue-600 text-xl shrink-0"></i>
                                    <select
                                        value={activeAlbumIndex}
                                        onChange={e => setActiveAlbumIndex(Number(e.target.value))}
                                        className="flex-1 max-w-lg border border-slate-300 rounded-xl py-2 px-3 text-sm font-bold text-slate-800 bg-white focus:outline-none focus:border-blue-400 cursor-pointer"
                                        dir="auto"
                                    >
                                        {albums.map((al, idx) => (
                                            <option key={idx} value={idx}>
                                                {lang === 'he' ? (al.album.title_he || al.album.title_en || `אלבום ${idx+1}`) : (al.album.title_en || al.album.title_he || `Album ${idx+1}`)}
                                                {al.album.year ? ` (שנת ${al.album.year})` : ''}
                                            </option>
                                        ))}
                                    </select>
                                    <span className="text-xs text-slate-400 font-bold shrink-0">{activeAlbumIndex + 1} / {albums.length}</span>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 bg-slate-50">
                                <div className="max-w-7xl mx-auto space-y-12 pb-20">
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-white border border-slate-200 rounded-full px-4 py-1 mb-4 text-sm font-bold text-slate-500 shadow-sm">{lang === 'he' ? 'ניתוח אלבום יחיד' : 'Single Album Analysis'}</div>
                                        <h2 className="text-4xl font-black text-slate-900 tracking-tight mb-2">{lang === 'he' ? (activeAlbum.album.title_he || activeAlbum.album.title_en) : activeAlbum.album.title_en}</h2>
                                        <p className="text-slate-500">{lang === 'he' ? 'מאת' : 'by'}: {activeAlbum.album.author || (lang === 'he' ? 'לא ידוע' : 'Unknown')} | {activeAlbum.album.year} | {activeAlbum.total_images} {lang === 'he' ? 'עמודים' : 'pages'}</p>
                                    </div>

                                    {/* 1. פרופיל מאקרו */}
                                    <AlbumFingerprint images={activeAlbum.images} />

                                    {/* 2. מולטימודאליות */}
                                    <ModalitiesDialectic images={activeAlbum.images} />
                                    
                                    {/* 3. תחביר מרחבי */}
                                    <SpatialSyntax images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />

                                    {/* 4. זרמי סצנות */}
                                    <SceneStreamgraph images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />
                                    
                                    {/* 5-8. שכבת רצפים לינאריים */}
                                    <VibeBarcode images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />
                                    <DemographicStream images={activeAlbum.images} />
                                    <SpatialRhythm images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />
                                    <VisualComplexity images={activeAlbum.images} />

                                    {/* 9-10. מודולים מתקדמים */}
                                    <NarrativeSegmentation images={activeAlbum.images} />
                                    <AnnotationUncertainty images={activeAlbum.images} />

                                    {/* 11. Ridgelines */}
                                    <LexicalRidgeline images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />

                                    {/* 12. Scene-Object Network */}
                                    <SceneObjectNetwork images={activeAlbum.images} onTagClick={jumpToGalleryWithTag} />

                                    {/* 13-14. מערכי יחסים מרוכזים */}
                                    <CoOccurrenceMatrix images={activeAlbum.images} />
                                    <HierarchicalTreemap images={activeAlbum.images} />

                                    {/* 15. פעולות – Actions Frequency */}
                                    <ActionsFrequency images={activeAlbum.images} />
                                </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'compare' && (
                            <ComparisonTab albums={albums} lang={lang} />
                        )}

                        {activeTab === 'search' && (
                            <GlobalSearchTab
                                albums={albums}
                                lang={lang}
                                onOpenAlbum={(idx) => {
                                    setGlobalFilter({ tag: null, category: null });
                                    setActiveAlbumIndex(idx);
                                    setActiveTab('gallery');
                                }}
                            />
                        )}

                        {activeTab === 'about' && (
                            <AboutTab lang={lang} />
                        )}
                    </main>
                </div>
                </LangContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
